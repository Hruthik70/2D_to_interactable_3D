<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generating 3D Model...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05050a;
      color: white;
      font-family: monospace;
      padding: 40px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(20, 20, 40, 0.9);
      border: 1px solid #86efac;
      border-radius: 12px;
      padding: 20px;
    }
    h1 { color: #86efac; margin-bottom: 20px; }
    .log { background: #0a0a15; padding: 10px; margin: 10px 0; border-left: 3px solid #86efac; max-height: 60px; overflow-y: auto; font-size: 12px; }
    .log.error { border-left-color: #ff6b6b; color: #ff6b6b; }
    .log.success { border-left-color: #4ade80; color: #4ade80; }
    .status { font-size: 24px; font-weight: bold; margin: 20px 0; text-align: center; color: #86efac; }
    .progress-bar { width: 100%; height: 10px; background: rgba(134, 239, 172, 0.1); border-radius: 5px; overflow: hidden; margin: 20px 0; }
    .progress-fill { height: 100%; background: #86efac; width: 0%; transition: width 0.3s; }
    img { max-width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid #86efac; }
    #logsContainer { max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎬 3D Generation Testing</h1>
    
    <div class="status" id="status">INITIALIZING...</div>
    
    <img id="previewImg" style="display:none;" />
    
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="logsContainer"></div>
  </div>

  <script>
    const logsDiv = document.getElementById("logsContainer");
    const statusDiv = document.getElementById("status");
    const progressFill = document.getElementById("progressFill");
    let logCount = 0;

    function log(msg, type = "info") {
      logCount++;
      const div = document.createElement("div");
      div.className = `log ${type}`;
      div.innerText = `[${logCount}] ${msg}`;
      logsDiv.appendChild(div);
      logsDiv.scrollTop = logsDiv.scrollHeight;
      console.log(`[${logCount}] ${msg}`);
    }

    function updateStatus(text) {
      statusDiv.innerText = text;
      log(`STATUS: ${text}`, "info");
    }

    function updateProgress(percent) {
      progressFill.style.width = percent + "%";
    }

    // ─────────────────────────────────────────────────────────────────────
    // START TESTING
    // ─────────────────────────────────────────────────────────────────────

    (async () => {
      try {
        log("=== STEP 1: Check localStorage ===", "success");
      
      const dataURL = localStorage.getItem("selectedFileDataURL");
      const fileExt = localStorage.getItem("selectedFileExt") || "jpg";
      
      if (!dataURL) {
        log("❌ ERROR: No selectedFileDataURL in localStorage!", "error");
        log("Available keys: " + Object.keys(localStorage).join(", "), "error");
        updateStatus("ERROR: No image data");
        throw new Error("No image data!");
      }
      
      log("✅ Found selectedFileDataURL in localStorage", "success");
      log(`✅ File extension: ${fileExt}`, "success");
      log(`✅ DataURL length: ${dataURL.length} characters`, "success");
      
      // ─────────────────────────────────────────────────────────────────────
      log("=== STEP 2: Display image preview ===", "success");
      
      const previewImg = document.getElementById("previewImg");
      previewImg.src = dataURL;
      previewImg.style.display = "block";
      log("✅ Image preview displayed", "success");
      
      updateProgress(10);
      updateStatus("READY: Image loaded");
      
      // ─────────────────────────────────────────────────────────────────────
      log("=== STEP 3: Convert image to Blob ===", "success");
      
      const arr = dataURL.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      const u8arr = new Uint8Array(bstr.length);
      for (let i = 0; i < bstr.length; i++) {
        u8arr[i] = bstr.charCodeAt(i);
      }
      const blob = new Blob([u8arr], { type: mime });
      
      log(`✅ Blob created: ${blob.size} bytes, type: ${mime}`, "success");
      updateProgress(20);
      
      // ─────────────────────────────────────────────────────────────────────
      log("=== STEP 4: Create FormData ===", "success");
      
      const formData = new FormData();
      formData.append("image", blob, `image.${fileExt}`);
      
      log("✅ FormData created with image field", "success");
      updateProgress(30);
      
      // ─────────────────────────────────────────────────────────────────────
      log("=== STEP 5: Send POST to backend ===", "success");
      
      updateStatus("SENDING: POST /generate_3d");
      updateProgress(40);
      
      const backendUrl = "http://localhost:5000/generate_3d";
      log(`🚀 Fetching: ${backendUrl}`, "success");
      
      const response = await fetch(backendUrl, {
        method: "POST",
        body: formData
      });
      
      log(`✅ Response received! Status: ${response.status}`, response.ok ? "success" : "error");
      updateProgress(60);
      
      // ─────────────────────────────────────────────────────────────────────
      log("=== STEP 6: Parse response ===", "success");
      
      const responseText = await response.text();
      log(`Response body: ${responseText.substring(0, 100)}...`, "info");
      
      let data;
      try {
        data = JSON.parse(responseText);
      } catch (e) {
        log(`❌ Failed to parse JSON: ${e.message}`, "error");
        throw e;
      }
      
      log(`✅ Response parsed as JSON`, "success");
      log(`task_id: ${data.task_id}`, "success");
      
      if (data.error) {
        log(`❌ Backend returned error: ${data.error}`, "error");
        throw new Error(data.error);
      }
      
      if (!data.task_id) {
        log(`❌ No task_id in response!`, "error");
        throw new Error("No task_id");
      }
      
      const taskId = data.task_id;
      log(`✅ Got task_id: ${taskId}`, "success");
      updateProgress(80);
      updateStatus("SUCCESS: Task created, polling...");
      
      // ─────────────────────────────────────────────────────────────────────
      log("=== STEP 7: Poll /progress/<task_id> ===", "success");
      
      const startTime = Date.now();
      const maxWait = 30000; // 30 seconds for testing
      
      async function pollProgress() {
        const elapsed = Date.now() - startTime;
        if (elapsed > maxWait) {
          log(`❌ Polling timed out after ${maxWait/1000}s`, "error");
          updateStatus("ERROR: Polling timeout");
          return;
        }
        
        try {
          const progressUrl = `http://localhost:5000/progress/${taskId}`;
          const progressResponse = await fetch(progressUrl);
          const progressData = await progressResponse.json();
          
          log(`[${(elapsed/1000).toFixed(1)}s] Status: ${progressData.status}, Progress: ${progressData.progress}%`, "info");
          updateProgress(80 + (progressData.progress / 5));
          updateStatus(`${progressData.status.toUpperCase()}: ${progressData.progress}%`);
          
          if (progressData.status === "success" || progressData.status === "complete") {
            log("✅ Generation complete!", "success");
            log(`Model: ${progressData.model}`, "success");
            
            if (progressData.model) {
              const modelFilename = progressData.model.split('/').pop();
              log(`Redirecting to viewer with model: ${modelFilename}`, "success");
              updateProgress(100);
              updateStatus("COMPLETE: Redirecting to viewer...");
              
              localStorage.setItem("modelFilename", modelFilename);
              setTimeout(() => {
                window.location.href = `http://localhost:5000/viewer-fixed.html?model=${encodeURIComponent(modelFilename)}`;
              }, 1000);
            }
            return;
          }
          
          if (progressData.status === "failed") {
            log(`❌ Generation failed: ${progressData.error}`, "error");
            updateStatus(`ERROR: ${progressData.error}`);
            return;
          }
          
          // Still pending, poll again
          setTimeout(pollProgress, 2000);
          
        } catch (err) {
          log(`❌ Polling error: ${err.message}`, "error");
          setTimeout(pollProgress, 3000);
        }
      }
      
      pollProgress();
      
    } catch (err) {
      log(`❌ FATAL ERROR: ${err.message}`, "error");
      updateStatus("FATAL ERROR");
      console.error(err);
    }
    })();
  </script>
</body>
</html>
